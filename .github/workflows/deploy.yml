name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build and Test Booking API
      run: cd booking-api-service && ./mvnw clean test

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v3

    - name: Build Booking API Docker Image
      run: |
        cd booking-api-service
        ./mvnw clean package -DskipTests
        docker build -t waygonway/booking-api:latest .
        
    # Example deployment step to AWS ECR / Render would go here

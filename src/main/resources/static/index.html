<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Ticket Reservation System</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="container">
    <!-- Website Header -->
    <header>
        <h1>🚆 Ticket Reservation System</h1>
        <button id="logout-btn" onclick="logout()">Logout</button>
    </header>

    <!-- Register Form -->
    <div id="register-section" class="card active">
        <h2>Register</h2>
        <input type="text" id="reg-username" placeholder="Username"/>
        <input type="email" id="reg-email" placeholder="Email"/>
        <input type="password" id="reg-password" placeholder="Password"/>
        <button onclick="register()">Register</button>
        <p>Already have an account? <span onclick="showLogin()">Login here</span></p>
    </div>

    <!-- Login Form -->
    <div id="login-section" class="card">
        <h2>Login</h2>
        <input type="text" id="login-username" placeholder="Username"/>
        <input type="password" id="login-password" placeholder="Password"/>
        <button onclick="login()">Login</button>
        <p>New user? <span onclick="showRegister()">Register here</span></p>
    </div>

    <!-- Dashboard -->
    <div id="dashboard-section" class="card dashboard-card">
        <h2>My Tickets</h2>
        <div class="dashboard-content">
            <!-- Ticket Booking Form -->
            <div class="ticket-form">
                <label>Train:</label>
                <select id="train-name"></select>

                <label>Source:</label>
                <select id="source"></select>

                <label>Destination:</label>
                <select id="destination"></select>

                <label>Price:</label>
                <input type="number" id="ticket-price" placeholder="Auto-filled" readonly/>

                <button onclick="addTicket()">Book Ticket</button>
            </div>

            <!-- Ticket List -->
            <div class="ticket-list-container">
                <h3>Booked Tickets</h3>
                <ul id="ticket-list"></ul>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>

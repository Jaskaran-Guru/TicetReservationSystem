services:
  # API Gateway & Integrated React Frontend
  - type: web
    name: api-gateway
    env: docker
    dockerContext: .
    dockerfilePath: api-gateway/Dockerfile
    plan: free # Change to standard/pro for production
    region: singapore # Using Singapore for better latency in Asia
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: 8080
      - key: AUTH_SERVICE_URL
        value: http://auth-admin-service:8081
      - key: BOOKING_SERVICE_URL
        value: http://booking-api-service:8082
      - key: DATABASE_SERVICE_URL
        value: http://database-service:8083
    
  # Auth Admin Service
  - type: pvt
    name: auth-admin-service
    env: docker
    dockerContext: .
    dockerfilePath: auth-admin-service/Dockerfile
    plan: free
    region: singapore
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: 8081
      - key: MONGODB_URI
        sync: false # Set this in Render Dashboard for security
        value: mongodb+srv://gurujaskaran2006_db_user:123@cluster0.imdqenc.mongodb.net/waygonway_db?retryWrites=true&w=majority
      - key: JWT_SECRET
        sync: false
        value: WaygonWaySecretKeyForTokenGeneration2024!@#$%

  # Booking API Service
  - type: pvt
    name: booking-api-service
    env: docker
    dockerContext: .
    dockerfilePath: booking-api-service/Dockerfile
    plan: free
    region: singapore
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: 8082
      - key: MONGODB_URI
        sync: false
        value: mongodb+srv://gurujaskaran2006_db_user:123@cluster0.imdqenc.mongodb.net/waygonway_db?retryWrites=true&w=majority
      - key: JWT_SECRET
        sync: false
        value: WaygonWaySecretKeyForTokenGeneration2024!@#$%
      - key: STRIPE_SECRET_KEY
        sync: false
        value: sk_test_placeholder

  # Database Service
  - type: pvt
    name: database-service
    env: docker
    dockerContext: .
    dockerfilePath: database-service/Dockerfile
    plan: free
    region: singapore
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: 8083
